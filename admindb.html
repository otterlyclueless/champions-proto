<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Champions Data — Admin Verification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface-2: #242836;
  --border: #2e3345;
  --text: #e4e7ef;
  --text-2: #8b90a0;
  --accent: #ef4444;
  --green: #22c55e;
  --amber: #f59e0b;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --teal: #06b6d4;
  --red-dim: rgba(239,68,68,0.12);
  --green-dim: rgba(34,197,94,0.12);
  --amber-dim: rgba(245,158,11,0.12);
  --blue-dim: rgba(59,130,246,0.12);
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* Layout */
.app { max-width: 1200px; margin: 0 auto; padding: 16px; }
@media(min-width:768px) { .app { padding: 24px 32px; } }

/* Header */
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
.header h1 { font-size:1.25rem; font-weight:800; letter-spacing:-0.02em; }
.header h1 span { color:var(--accent); }
.auth-bar { display:flex; align-items:center; gap:8px; }
.auth-bar input {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:8px 12px; color:var(--text); font-size:0.85rem; width:160px;
}
.auth-bar input::placeholder { color:var(--text-2); }
.btn {
  padding:8px 16px; border-radius:var(--radius-sm); border:none; font-size:0.85rem;
  font-weight:600; transition:all 0.15s;
}
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#dc2626; }
.btn-secondary { background:var(--surface-2); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { background:var(--border); }
.btn-small { padding:5px 10px; font-size:0.75rem; }
.user-badge {
  background:var(--green-dim); color:var(--green); padding:6px 12px;
  border-radius:var(--radius-sm); font-size:0.8rem; font-weight:600;
}

/* Setup Banner */
.setup-banner {
  background:var(--amber-dim); border:1px solid rgba(245,158,11,0.3); border-radius:var(--radius);
  padding:16px 20px; margin-bottom:20px;
}
.setup-banner h3 { color:var(--amber); font-size:0.9rem; margin-bottom:8px; }
.setup-banner p { font-size:0.82rem; color:var(--text-2); line-height:1.5; margin-bottom:12px; }
.setup-banner pre {
  background:var(--bg); border-radius:var(--radius-sm); padding:12px; font-size:0.75rem;
  overflow-x:auto; line-height:1.6; color:var(--teal); margin-bottom:12px;
}
.setup-banner code { font-family:'SF Mono',Consolas,monospace; }

/* Overview Cards */
.overview { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; margin-bottom:24px; }
.stat-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px 20px;
}
.stat-card .label { font-size:0.75rem; color:var(--text-2); text-transform:uppercase; letter-spacing:0.05em; font-weight:600; }
.stat-card .row { display:flex; align-items:baseline; gap:8px; margin:8px 0 10px; }
.stat-card .big { font-size:1.75rem; font-weight:800; letter-spacing:-0.03em; }
.stat-card .sub { font-size:0.85rem; color:var(--text-2); }
.progress-track { height:6px; background:var(--surface-2); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; transition:width 0.5s ease; }
.progress-fill.green { background:var(--green); }
.progress-fill.amber { background:var(--amber); }
.progress-fill.red { background:var(--accent); }
.progress-fill.blue { background:var(--blue); }

/* Tabs */
.tabs { display:flex; gap:4px; margin-bottom:20px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:4px; }
.tab {
  padding:10px 18px; border-radius:var(--radius-sm); background:transparent; border:none;
  color:var(--text-2); font-size:0.85rem; font-weight:600; white-space:nowrap; transition:all 0.15s;
}
.tab.active { background:var(--surface); color:var(--text); }
.tab:hover:not(.active) { color:var(--text); }
.tab .count {
  display:inline-block; background:var(--surface-2); padding:2px 7px; border-radius:10px;
  font-size:0.7rem; margin-left:4px;
}
.tab.active .count { background:var(--accent); color:#fff; }

/* Filters */
.filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.filters select, .filters input {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:8px 12px; color:var(--text); font-size:0.82rem;
}
.filters input { flex:1; min-width:180px; }
.filter-pills { display:flex; gap:4px; }
.pill {
  padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:transparent;
  color:var(--text-2); font-size:0.78rem; font-weight:500; cursor:pointer; transition:all 0.15s;
}
.pill.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.pill:hover:not(.active) { border-color:var(--text-2); color:var(--text); }

/* Cards */
.card-list { display:flex; flex-direction:column; gap:8px; }
.entry-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px 18px; transition:border-color 0.15s;
}
.entry-card:hover { border-color:var(--text-2); }
.entry-card.verified { border-left:3px solid var(--green); }
.entry-card.unverified { border-left:3px solid var(--text-2); }
.entry-card.has-override { border-left:3px solid var(--amber); }
.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:8px; }
.card-name { font-weight:700; font-size:0.95rem; }
.card-badges { display:flex; gap:4px; flex-wrap:wrap; }
.badge {
  padding:3px 8px; border-radius:6px; font-size:0.7rem; font-weight:600;
}
.badge-type { background:var(--blue-dim); color:var(--blue); }
.badge-cat { background:var(--surface-2); color:var(--text-2); }
.badge-verified { background:var(--green-dim); color:var(--green); }
.badge-unverified { background:var(--red-dim); color:var(--accent); }
.badge-override { background:var(--amber-dim); color:var(--amber); }

.card-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:10px 0; }
.stat-group label { display:block; font-size:0.68rem; color:var(--text-2); text-transform:uppercase; font-weight:600; letter-spacing:0.04em; margin-bottom:3px; }
.stat-group .value { font-size:0.9rem; font-weight:700; }
.stat-group .showdown { color:var(--text-2); font-size:0.75rem; text-decoration:line-through; margin-left:4px; }

.edit-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin:10px 0 6px; }
.edit-row label { font-size:0.68rem; color:var(--amber); text-transform:uppercase; font-weight:600; letter-spacing:0.04em; }
.edit-row input {
  width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px;
  padding:6px 10px; color:var(--text); font-size:0.85rem; font-weight:600;
}
.edit-row input:focus { border-color:var(--amber); outline:none; }
.edit-row input::placeholder { color:var(--text-2); font-weight:400; }

.note-input {
  width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px;
  padding:6px 10px; color:var(--text); font-size:0.82rem; margin:4px 0;
}
.note-input:focus { border-color:var(--amber); outline:none; }
.note-display { font-size:0.8rem; color:var(--amber); font-style:italic; margin:4px 0; }

.card-actions { display:flex; align-items:center; justify-content:space-between; margin-top:10px; gap:8px; }
.toggle-wrap { display:flex; align-items:center; gap:8px; }
.toggle-label { font-size:0.8rem; color:var(--text-2); font-weight:500; }
.toggle {
  position:relative; width:44px; height:24px; background:var(--surface-2);
  border-radius:12px; cursor:pointer; transition:background 0.2s; border:none;
}
.toggle.on { background:var(--green); }
.toggle::after {
  content:''; position:absolute; top:2px; left:2px; width:20px; height:20px;
  background:#fff; border-radius:50%; transition:transform 0.2s;
}
.toggle.on::after { transform:translateX(20px); }

.save-indicator { font-size:0.75rem; font-weight:600; }
.save-indicator.saving { color:var(--amber); }
.save-indicator.saved { color:var(--green); }
.save-indicator.error { color:var(--accent); }

/* Loading & Empty */
.loading { text-align:center; padding:60px 20px; color:var(--text-2); }
.loading .spinner { display:inline-block; width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:40px 20px; color:var(--text-2); font-size:0.9rem; }

/* ══════════════════════════════════════════════════════════ */
/* Drop E.2 — Learnset Editor modal */
/* ══════════════════════════════════════════════════════════ */
.le-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;z-index:300;padding:0}
.le-overlay.open{display:flex;animation:leFade .18s ease}
@keyframes leFade{from{opacity:0}to{opacity:1}}
@media(min-width:640px){.le-overlay{align-items:center;padding:20px}}
.le-sheet{background:var(--surface);width:100%;max-width:680px;height:92vh;max-height:92vh;border-radius:20px 20px 0 0;display:flex;flex-direction:column;overflow:hidden;animation:leSlide .25s ease}
@keyframes leSlide{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(min-width:640px){.le-sheet{height:88vh;max-height:820px;border-radius:16px}}
.le-head{padding:16px 18px 12px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--surface)}
.le-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.le-close{background:var(--surface-2);border:none;color:var(--text);width:32px;height:32px;border-radius:8px;font-size:14px;cursor:pointer;flex-shrink:0}
.le-close:hover{background:var(--border)}
.le-title{flex:1;min-width:0}
.le-title-main{font-size:1rem;font-weight:800;letter-spacing:-0.01em;line-height:1.2}
.le-title-sub{font-size:0.72rem;color:var(--text-2);margin-top:2px;font-weight:600}
.le-search{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:0.85rem;padding:10px 12px;border-radius:8px;outline:none;margin-bottom:10px}
.le-search::placeholder{color:var(--text-2)}
.le-search:focus{border-color:var(--accent)}
.le-types{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin:0 -18px 10px;padding-left:18px;padding-right:18px}
.le-types::-webkit-scrollbar{display:none}
.le-pill{font-size:0.62rem;font-weight:800;padding:5px 10px;border-radius:999px;border:none;cursor:pointer;color:#fff;white-space:nowrap;flex-shrink:0;letter-spacing:0.02em;font-family:inherit;opacity:0.5;transition:opacity .15s}
.le-pill.on{opacity:1}
.le-pill:first-child{background:var(--surface-2);color:var(--text-2);opacity:1}
.le-pill:first-child.on{background:var(--accent);color:#fff}
.le-pill.le-t-Normal.on{background:#A8A77A}.le-pill.le-t-Fire.on{background:#EE8130}.le-pill.le-t-Water.on{background:#6390F0}
.le-pill.le-t-Electric.on{background:#E8C030;color:#1a1a2e}.le-pill.le-t-Grass.on{background:#7AC74C}.le-pill.le-t-Ice.on{background:#96D9D6;color:#1a1a2e}
.le-pill.le-t-Fighting.on{background:#C22E28}.le-pill.le-t-Poison.on{background:#A33EA1}.le-pill.le-t-Ground.on{background:#B08030}
.le-pill.le-t-Flying.on{background:#A98FF3}.le-pill.le-t-Psychic.on{background:#F95587}.le-pill.le-t-Bug.on{background:#A6B91A}
.le-pill.le-t-Rock.on{background:#B6A136}.le-pill.le-t-Ghost.on{background:#735797}.le-pill.le-t-Dragon.on{background:#6F35FC}
.le-pill.le-t-Dark.on{background:#4f3f33}.le-pill.le-t-Steel.on{background:#B7B7CE;color:#1a1a2e}.le-pill.le-t-Fairy.on{background:#D685AD}
.le-pill:not(.on):not(:first-child){background:var(--surface-2);color:var(--text-2)}
.le-bulk-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.le-count{font-size:0.72rem;color:var(--text-2);font-weight:600}
.le-list{flex:1;overflow-y:auto;padding:6px 0}
.le-list::-webkit-scrollbar{width:6px}
.le-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.le-row{display:flex;align-items:center;gap:10px;padding:9px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.le-row:hover{background:var(--surface-2)}
.le-row.on{background:rgba(34,197,94,.04)}
.le-row.on:hover{background:rgba(34,197,94,.08)}
.le-chk{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.72rem;font-weight:800;flex-shrink:0;transition:background .12s, border-color .12s}
.le-chk.on{background:var(--green);border-color:var(--green)}
.le-type-pill{font-size:0.55rem;font-weight:800;padding:3px 7px;border-radius:4px;color:#fff;letter-spacing:0.02em;flex-shrink:0;min-width:56px;text-align:center}
.le-type-pill.le-t-Normal{background:#A8A77A}.le-type-pill.le-t-Fire{background:#EE8130}.le-type-pill.le-t-Water{background:#6390F0}
.le-type-pill.le-t-Electric{background:#E8C030;color:#1a1a2e}.le-type-pill.le-t-Grass{background:#7AC74C}.le-type-pill.le-t-Ice{background:#96D9D6;color:#1a1a2e}
.le-type-pill.le-t-Fighting{background:#C22E28}.le-type-pill.le-t-Poison{background:#A33EA1}.le-type-pill.le-t-Ground{background:#B08030}
.le-type-pill.le-t-Flying{background:#A98FF3}.le-type-pill.le-t-Psychic{background:#F95587}.le-type-pill.le-t-Bug{background:#A6B91A}
.le-type-pill.le-t-Rock{background:#B6A136}.le-type-pill.le-t-Ghost{background:#735797}.le-type-pill.le-t-Dragon{background:#6F35FC}
.le-type-pill.le-t-Dark{background:#4f3f33}.le-type-pill.le-t-Steel{background:#B7B7CE;color:#1a1a2e}.le-type-pill.le-t-Fairy{background:#D685AD}
.le-move-info{flex:1;min-width:0}
.le-move-name{font-size:0.84rem;font-weight:700;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
.le-move-meta{font-size:0.68rem;color:var(--text-2);margin-top:2px;font-variant-numeric:tabular-nums}
.le-delta{font-weight:900;font-size:0.85rem;padding:1px 5px;border-radius:3px;line-height:1}
.le-delta.added{color:var(--green);background:rgba(34,197,94,.15)}
.le-delta.removed{color:var(--accent);background:rgba(239,68,68,.15)}
.le-foot{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 18px;display:flex;gap:8px;justify-content:flex-end}
.le-foot .btn{padding:10px 18px;font-size:0.82rem;font-weight:700}
.le-foot .btn:disabled{opacity:0.45;cursor:not-allowed}
.page-controls { display:flex; align-items:center; justify-content:center; gap:12px; margin-top:16px; padding:12px; }
.page-info { font-size:0.82rem; color:var(--text-2); }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Header -->
  <div class="header">
    <h1><span>Champions</span> Data Admin</h1>
    <div class="auth-bar" id="auth-bar">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button class="btn btn-primary" onclick="login()">Sign In</button>
    </div>
    <div class="auth-bar" id="user-bar" style="display:none">
      <span class="user-badge" id="user-email"></span>
      <button class="btn btn-secondary btn-small" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <!-- Setup Banner (deprecated — kept as a no-op for layout; can be removed once we drop the dismiss flag) -->
  <div class="setup-banner" id="setup-banner" style="display:none"></div>

  <!-- Refresh Bar -->
  <div id="refresh-bar" style="display:none;margin-bottom:16px">
    <button class="btn btn-secondary" onclick="refreshView()" id="refresh-btn" style="width:100%">
      Refresh Materialised View
    </button>
  </div>

  <!-- Overview -->
  <div class="overview" id="overview"></div>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Drop E.2: Learnset Editor modal -->
  <div class="le-overlay" id="leEditor"></div>

  <!-- Filters -->
  <div class="filters" id="filters"></div>

  <!-- Content -->
  <div id="content">
    <div class="loading"><div class="spinner"></div><br>Loading data...</div>
  </div>

  <!-- Pagination -->
  <div class="page-controls" id="pagination" style="display:none"></div>
</div>

<script>
// ── Supabase Setup ──
const SUPA_URL = 'https://hrxqhhjkhhlpafhfarbl.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhyeHFoaGpraGhscGFmaGZhcmJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDAzNjYsImV4cCI6MjA5MTY3NjM2Nn0.AALRUAOd3WVj1vmu42RvDV-RGHCpa8ymplkXsx_NSW0';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── State ──
let state = {
  tab: 'moves',
  filter: 'unverified',
  search: '',
  page: 0,
  pageSize: 30,
  user: null,
  data: { pokemon:[], moves:[], abilities:[], items:[], pokemon_moves_count:{} },
  counts: {},
  saving: {},
  // Drop E.2: learnset editor per-pokemon counts + in-flight editor state
  learnsetCounts: {},
  learnsetEditor: null  // { pokemonId, pokemon, original:Set<moveId>, pending:Set<moveId>, search:'', typeFilter:'all', busy:false }
};

// ── Auth ──
async function login() {
  const email = document.getElementById('email').value;
  const pw = document.getElementById('password').value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) { alert('Login failed: ' + error.message); return; }
  state.user = data.user;
  updateAuthUI();
}
async function logout() {
  await sb.auth.signOut();
  state.user = null;
  updateAuthUI();
}
function updateAuthUI() {
  document.getElementById('auth-bar').style.display = state.user ? 'none' : 'flex';
  document.getElementById('user-bar').style.display = state.user ? 'flex' : 'none';
  document.getElementById('refresh-bar').style.display = state.user ? 'block' : 'none';
  if (state.user) document.getElementById('user-email').textContent = state.user.email;
}

async function refreshView() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = 'Refreshing...';
  btn.disabled = true;
  const { error } = await sb.rpc('refresh_learnset_view');
  if (error) {
    btn.textContent = 'Refresh failed — ' + error.message;
    btn.style.borderColor = 'var(--accent)';
  } else {
    btn.textContent = 'View refreshed!';
    btn.style.borderColor = 'var(--green)';
  }
  setTimeout(() => {
    btn.textContent = 'Refresh Materialised View';
    btn.disabled = false;
    btn.style.borderColor = '';
  }, 3000);
}

// ── Check existing session ──
sb.auth.getSession().then(({data}) => {
  if (data.session) { state.user = data.session.user; updateAuthUI(); }
});

// ── Setup banner ──
function dismissSetup() {
  document.getElementById('setup-banner').style.display = 'none';
  localStorage.setItem('champions_setup_done', '1');
}
if (localStorage.getItem('champions_setup_done')) {
  document.getElementById('setup-banner').style.display = 'none';
}

// ── Data Loading ──
async function loadAllData() {
  try {
    const [pokRes, movRes, abRes, itRes] = await Promise.all([
      sb.from('pokemon').select('id,name,dex_number,form,base_hp,base_atk,base_def,base_spa,base_spd,base_spe,champions_verified').order('dex_number'),
      sb.from('moves').select('*').order('name'),
      sb.from('abilities').select('*').order('name'),
      sb.from('items').select('*').order('name'),
    ]);

    if (pokRes.error) console.error('Pokemon load error:', pokRes.error);
    if (movRes.error) console.error('Moves load error:', movRes.error);
    if (abRes.error) console.error('Abilities load error:', abRes.error);
    if (itRes.error) console.error('Items load error:', itRes.error);

    state.data.pokemon = pokRes.data || [];
    state.data.moves = movRes.data || [];
    state.data.abilities = abRes.data || [];
    state.data.items = (itRes.data || []).filter(i => i.description);

    // Count learnset verifications using head:true (no row download)
    const [totalRes, verifiedRes] = await Promise.all([
      sb.from('pokemon_moves').select('*', { count: 'exact', head: true }),
      sb.from('pokemon_moves').select('*', { count: 'exact', head: true }).eq('champions_verified', true),
    ]);
    state.counts.learnsets = {
      total: totalRes.count || 0,
      verified: verifiedRes.count || 0
    };

    // Drop E.2: per-Pokemon learnset counts (one small aggregate query)
    loadLearnsetCounts();

    computeCounts();
    renderOverview();
    renderTabs();
    renderFilters();
    renderContent();
  } catch (err) {
    console.error('Load failed:', err);
    document.getElementById('content').innerHTML = '<div class="empty">Failed to load data. Check console for errors.</div>';
  }
}

function computeCounts() {
  const c = {};
  ['pokemon','moves','abilities','items'].forEach(key => {
    const d = state.data[key];
    c[key] = { total: d.length, verified: d.filter(r => r.champions_verified).length };
  });
  if (state.counts.learnsets) c.learnsets = state.counts.learnsets;
  else c.learnsets = { total: 0, verified: 0 };
  state.counts = c;
}

// ── Rendering ──
function renderOverview() {
  const cats = [
    { key:'pokemon', label:'Pokemon', color:'green', icon:'Base Stats' },
    { key:'moves', label:'Moves', color:'red', icon:'Power/Acc/PP' },
    { key:'abilities', label:'Abilities', color:'blue', icon:'Descriptions' },
    { key:'items', label:'Items', color:'amber', icon:'Descriptions' },
    { key:'learnsets', label:'Learnsets', color:'red', icon:'Move Lists' },
  ];
  document.getElementById('overview').innerHTML = cats.map(c => {
    const d = state.counts[c.key] || {total:0,verified:0};
    const pct = d.total ? Math.round(d.verified/d.total*100) : 0;
    const fillColor = pct === 100 ? 'green' : pct > 50 ? 'amber' : 'red';
    return `<div class="stat-card">
      <div class="label">${c.label}</div>
      <div class="row">
        <span class="big">${pct}%</span>
        <span class="sub">${d.verified} / ${d.total} verified</span>
      </div>
      <div class="progress-track"><div class="progress-fill ${fillColor}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderTabs() {
  const tabs = [
    { key:'moves', label:'Moves', count: state.counts.moves?.total - state.counts.moves?.verified },
    { key:'abilities', label:'Abilities', count: state.counts.abilities?.total - state.counts.abilities?.verified },
    { key:'items', label:'Items', count: state.counts.items?.total - state.counts.items?.verified },
    { key:'pokemon', label:'Stats', count: state.counts.pokemon?.total - state.counts.pokemon?.verified },
  ];
  document.getElementById('tabs').innerHTML = tabs.map(t =>
    `<button class="tab ${state.tab===t.key?'active':''}" onclick="switchTab('${t.key}')">
      ${t.label}<span class="count">${t.count}</span>
    </button>`
  ).join('');
}

function switchTab(key) {
  state.tab = key; state.page = 0;
  renderTabs(); renderFilters(); renderContent();
}

function renderFilters() {
  document.getElementById('filters').innerHTML = `
    <div class="filter-pills">
      <button class="pill ${state.filter==='all'?'active':''}" onclick="setFilter('all')">All</button>
      <button class="pill ${state.filter==='unverified'?'active':''}" onclick="setFilter('unverified')">Unverified</button>
      <button class="pill ${state.filter==='verified'?'active':''}" onclick="setFilter('verified')">Verified</button>
      <button class="pill ${state.filter==='override'?'active':''}" onclick="setFilter('override')">Has Override</button>
    </div>
    <input type="search" placeholder="Search by name..." value="${state.search}" oninput="setSearch(this.value)">
  `;
}
function setFilter(f) { state.filter=f; state.page=0; renderFilters(); renderContent(); }
function setSearch(s) { state.search=s; state.page=0; renderContent(); }

function getFiltered() {
  let items = state.data[state.tab] || [];
  if (state.filter === 'unverified') items = items.filter(r => !r.champions_verified);
  else if (state.filter === 'verified') items = items.filter(r => r.champions_verified);
  else if (state.filter === 'override') items = items.filter(r => r.champions_power || r.champions_accuracy || r.champions_pp || r.champions_note);
  if (state.search) {
    const q = state.search.toLowerCase();
    items = items.filter(r => (r.name||'').toLowerCase().includes(q));
  }
  return items;
}

function renderContent() {
  const items = getFiltered();
  const start = state.page * state.pageSize;
  const pageItems = items.slice(start, start + state.pageSize);
  const totalPages = Math.ceil(items.length / state.pageSize);

  if (!items.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No entries match your filters.</div>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  let html;
  if (state.tab === 'moves') html = pageItems.map(renderMoveCard).join('');
  else if (state.tab === 'abilities') html = pageItems.map(renderAbilityCard).join('');
  else if (state.tab === 'items') html = pageItems.map(renderItemCard).join('');
  else html = pageItems.map(renderPokemonCard).join('');

  document.getElementById('content').innerHTML = `<div class="card-list">${html}</div>`;

  // Pagination
  const pg = document.getElementById('pagination');
  if (totalPages > 1) {
    pg.style.display = 'flex';
    pg.innerHTML = `
      <button class="btn btn-secondary btn-small" onclick="prevPage()" ${state.page===0?'disabled':''}>Prev</button>
      <span class="page-info">Page ${state.page+1} of ${totalPages} (${items.length} entries)</span>
      <button class="btn btn-secondary btn-small" onclick="nextPage()" ${state.page>=totalPages-1?'disabled':''}>Next</button>
    `;
  } else {
    pg.style.display = 'none';
  }
}
function prevPage() { if(state.page>0){state.page--;renderContent();window.scrollTo(0,300);} }
function nextPage() { state.page++;renderContent();window.scrollTo(0,300); }

// ── Actions ──
function toggleEdit(table, id) {
  const arr = state.data[table];
  const item = arr.find(r => r.id === id);
  if (item) { item._editing = !item._editing; renderContent(); }
}

async function toggleVerified(table, id, value) {
  if (!state.user) { alert('Sign in to make changes'); return; }
  showSave(id, 'saving', 'Saving...');
  const { error } = await sb.from(table).update({ champions_verified: value }).eq('id', id);
  if (error) { showSave(id, 'error', error.message); return; }
  const item = state.data[table].find(r => r.id === id);
  if (item) item.champions_verified = value;
  computeCounts(); renderOverview(); renderTabs(); renderContent();
  showSave(id, 'saved', 'Saved');
}

async function setOverride(id, field, value) {
  if (!state.user) { alert('Sign in to make changes'); return; }
  const numFields = ['champions_power','champions_accuracy','champions_pp'];
  const directFields = ['category','description','short_description'];
  let val;
  if (numFields.includes(field)) val = value===''?null:parseInt(value);
  else if (directFields.includes(field)) val = value;
  else val = value||null;

  showSave(id, 'saving', 'Saving...');
  const { error } = await sb.from('moves').update({ [field]: val }).eq('id', id);
  if (error) { showSave(id, 'error', error.message); return; }
  const item = state.data.moves.find(r => r.id === id);
  if (item) item[field] = val;
  showSave(id, 'saved', 'Saved');
}

async function setFieldDirect(table, id, field, value) {
  if (!state.user) { alert('Sign in to make changes'); return; }
  showSave(id, 'saving', 'Saving...');
  const { error } = await sb.from(table).update({ [field]: value||null }).eq('id', id);
  if (error) { showSave(id, 'error', error.message); return; }
  const item = state.data[table].find(r => r.id === id);
  if (item) item[field] = value||null;
  showSave(id, 'saved', 'Saved');
}

function showSave(id, cls, text) {
  const el = document.getElementById('save-'+id);
  if (el) { el.className = 'save-indicator '+cls; el.textContent = text; }
  if (cls === 'saved') setTimeout(() => { if(el) el.textContent=''; }, 2000);
}

// ══════════════════════════════════════════════════════════════════
// DROP E.2 — Learnset Editor
// Per-Pokemon modal where each Champions move is a checkbox. Save
// diffs pending vs original and runs INSERT / DELETE on pokemon_moves.
// This is how admins fix cases where a move is flagged 'illegal' but
// the Pokemon should actually be able to learn it (and vice versa).
// ══════════════════════════════════════════════════════════════════

// Load per-Pokemon learnset counts. One query, grouped in JS.
async function loadLearnsetCounts(){
  try{
    const { data, error } = await sb.from('pokemon_moves').select('pokemon_id').limit(50000);
    if(error){ console.error('learnsetCounts error:', error); return; }
    const counts = {};
    (data||[]).forEach(r => { counts[r.pokemon_id] = (counts[r.pokemon_id]||0) + 1; });
    state.learnsetCounts = counts;
    if(state.tab === 'pokemon') renderContent();
  } catch(e) { console.error('learnsetCounts exception:', e); }
}

async function openLearnsetEditor(pokemonId){
  if(!state.user){ alert('Sign in to manage learnsets'); return; }
  const poke = state.data.pokemon.find(p => p.id === pokemonId);
  if(!poke){ alert('Pokemon not found'); return; }
  // Fetch current learnset for this species
  const { data, error } = await sb.from('pokemon_moves').select('move_id').eq('pokemon_id', pokemonId).limit(2000);
  if(error){ alert('Failed to load learnset: '+error.message); return; }
  const original = new Set((data||[]).map(r => r.move_id));
  state.learnsetEditor = {
    pokemonId, pokemon: poke,
    original, pending: new Set(original),
    search: '', typeFilter: 'all', busy: false
  };
  document.getElementById('leEditor').classList.add('open');
  renderLearnsetEditor();
}

function closeLearnsetEditor(){
  state.learnsetEditor = null;
  document.getElementById('leEditor').classList.remove('open');
}

function toggleLearnsetMove(moveId){
  const ed = state.learnsetEditor; if(!ed) return;
  if(ed.pending.has(moveId)) ed.pending.delete(moveId);
  else ed.pending.add(moveId);
  updateLearnsetEditorFooter();
  // Toggle just this row's visual state without re-rendering the whole list
  const row = document.getElementById('le-row-'+moveId);
  if(row){
    const on = ed.pending.has(moveId);
    row.classList.toggle('on', on);
    const chk = row.querySelector('.le-chk');
    if(chk) chk.classList.toggle('on', on);
  }
}

function setLearnsetSearch(v){
  const ed = state.learnsetEditor; if(!ed) return;
  ed.search = (v||'').toLowerCase();
  renderLearnsetList();
}
function setLearnsetTypeFilter(t){
  const ed = state.learnsetEditor; if(!ed) return;
  ed.typeFilter = t;
  renderLearnsetEditor();
}
function toggleLearnsetAll(){
  const ed = state.learnsetEditor; if(!ed) return;
  const visible = getLearnsetVisibleMoves();
  const allOn = visible.every(m => ed.pending.has(m.id));
  visible.forEach(m => {
    if(allOn) ed.pending.delete(m.id);
    else ed.pending.add(m.id);
  });
  renderLearnsetList();
  updateLearnsetEditorFooter();
}

function getLearnsetVisibleMoves(){
  const ed = state.learnsetEditor; if(!ed) return [];
  return state.data.moves.filter(m => {
    if(m.in_champions === false) return false;
    if(ed.typeFilter !== 'all' && m.type !== ed.typeFilter) return false;
    if(ed.search && !m.name.toLowerCase().includes(ed.search)) return false;
    return true;
  });
}

function renderLearnsetEditor(){
  const ed = state.learnsetEditor; if(!ed) return;
  const p = ed.pokemon;
  // Type pills — only show types present in the Champions move pool
  const types = Array.from(new Set(state.data.moves.filter(m => m.in_champions!==false).map(m => m.type))).sort();
  const pills = `<button class="le-pill ${ed.typeFilter==='all'?'on':''}" onclick="setLearnsetTypeFilter('all')">ALL</button>` +
    types.map(t => `<button class="le-pill le-t-${t} ${ed.typeFilter===t?'on':''}" onclick="setLearnsetTypeFilter('${t}')">${t.toUpperCase()}</button>`).join('');
  document.getElementById('leEditor').innerHTML = `
    <div class="le-sheet">
      <div class="le-head">
        <div class="le-top">
          <button class="le-close" onclick="closeLearnsetEditor()">✕</button>
          <div class="le-title">
            <div class="le-title-main">Manage Learnset</div>
            <div class="le-title-sub">#${p.dex_number} ${p.name}${p.form&&p.form!=='Base'?' ('+p.form+')':''}</div>
          </div>
        </div>
        <input class="le-search" placeholder="Search moves..." value="${ed.search.replace(/"/g,'&quot;')}" oninput="setLearnsetSearch(this.value)">
        <div class="le-types">${pills}</div>
        <div class="le-bulk-row">
          <button class="btn btn-secondary btn-small" onclick="toggleLearnsetAll()">Toggle visible</button>
          <span class="le-count" id="leCount"></span>
        </div>
      </div>
      <div class="le-list" id="leList"></div>
      <div class="le-foot">
        <button class="btn btn-secondary" onclick="closeLearnsetEditor()">Cancel</button>
        <button class="btn btn-primary" id="leSaveBtn" onclick="saveLearnsetChanges()">Save Changes</button>
      </div>
    </div>
  `;
  renderLearnsetList();
  updateLearnsetEditorFooter();
}

function renderLearnsetList(){
  const ed = state.learnsetEditor; if(!ed) return;
  const list = document.getElementById('leList'); if(!list) return;
  const moves = getLearnsetVisibleMoves();
  if(!moves.length){
    list.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-2);font-size:0.85rem">No moves match</div>';
    return;
  }
  list.innerHTML = moves.map(m => {
    const on = ed.pending.has(m.id);
    const wasOn = ed.original.has(m.id);
    let delta = '';
    if(on && !wasOn) delta = '<span class="le-delta added">+</span>';
    else if(!on && wasOn) delta = '<span class="le-delta removed">−</span>';
    const pwr = (m.champions_power ?? m.power) || 0;
    const acc = m.champions_accuracy ?? m.accuracy;
    const pp = (m.champions_pp ?? m.pp) || 0;
    return `<div class="le-row ${on?'on':''}" id="le-row-${m.id}" onclick="toggleLearnsetMove('${m.id}')">
      <div class="le-chk ${on?'on':''}">${on?'✓':''}</div>
      <span class="le-type-pill le-t-${m.type}">${m.type.toUpperCase()}</span>
      <div class="le-move-info">
        <div class="le-move-name">${m.name}${delta}</div>
        <div class="le-move-meta">${pwr>0?pwr:'—'} · ${acc?acc+'%':'—'} · ${pp}pp · ${m.category}</div>
      </div>
    </div>`;
  }).join('');
}

function updateLearnsetEditorFooter(){
  const ed = state.learnsetEditor; if(!ed) return;
  const added = [...ed.pending].filter(id => !ed.original.has(id)).length;
  const removed = [...ed.original].filter(id => !ed.pending.has(id)).length;
  const el = document.getElementById('leCount');
  if(el){
    const total = ed.pending.size;
    let diff = '';
    if(added || removed){
      diff = ` · <span style="color:var(--green)">+${added}</span> / <span style="color:var(--accent)">−${removed}</span>`;
    }
    el.innerHTML = `<b style="color:var(--text)">${total}</b> selected${diff}`;
  }
  const saveBtn = document.getElementById('leSaveBtn');
  if(saveBtn) saveBtn.disabled = (added === 0 && removed === 0) || ed.busy;
}

async function saveLearnsetChanges(){
  const ed = state.learnsetEditor; if(!ed || ed.busy) return;
  const toAdd = [...ed.pending].filter(id => !ed.original.has(id));
  const toRemove = [...ed.original].filter(id => !ed.pending.has(id));
  if(!toAdd.length && !toRemove.length){ closeLearnsetEditor(); return; }
  ed.busy = true;
  const saveBtn = document.getElementById('leSaveBtn');
  if(saveBtn){ saveBtn.disabled = true; saveBtn.textContent = 'Saving...'; }
  try {
    // Insert new rows
    if(toAdd.length){
      const rows = toAdd.map(moveId => ({
        pokemon_id: ed.pokemonId,
        move_id: moveId,
        learn_method: 'champions',
        champions_verified: true
      }));
      const { error } = await sb.from('pokemon_moves').insert(rows);
      if(error) throw error;
    }
    // Delete removed rows one-by-one (Supabase JS doesn't support .in() + composite WHERE in a single call cleanly)
    for(const moveId of toRemove){
      const { error } = await sb.from('pokemon_moves').delete().eq('pokemon_id', ed.pokemonId).eq('move_id', moveId);
      if(error) throw error;
    }
    // Update local count
    state.learnsetCounts[ed.pokemonId] = ed.pending.size;
    closeLearnsetEditor();
    if(state.tab === 'pokemon') renderContent();
    alert(`Saved — added ${toAdd.length}, removed ${toRemove.length}. Users may need to refresh to see updates.`);
  } catch(e) {
    alert('Save failed: ' + (e.message || e));
    ed.busy = false;
    if(saveBtn){ saveBtn.disabled = false; saveBtn.textContent = 'Save Changes'; }
  }
}

// ── Init ──
loadAllData();
</script>
</body>
</html>
